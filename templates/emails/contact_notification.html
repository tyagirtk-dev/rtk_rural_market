<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f7f6f1; font-family:Arial, sans-serif; color:#22261f;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f7f6f1; padding:24px 0;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:16px; overflow:hidden;">
        <tr><td style="background:#dba528; padding:24px; text-align:center;">
          <span style="color:#14301f; font-size:20px; font-weight:bold;">New Contact Message</span>
        </td></tr>
        <tr><td style="padding:32px 28px;">
          <p style="font-size:14px; margin:0 0 6px;"><strong>From:</strong> {{ msg.name }} &lt;{{ msg.email }}&gt;</p>
          {% if msg.mobile %}<p style="font-size:14px; margin:0 0 6px;"><strong>Mobile:</strong> {{ msg.mobile }}</p>{% endif %}
          {% if msg.subject %}<p style="font-size:14px; margin:0 0 6px;"><strong>Subject:</strong> {{ msg.subject }}</p>{% endif %}
          <p style="font-size:14px; margin:16px 0 4px;"><strong>Message:</strong></p>
          <p style="font-size:14px; line-height:1.6; color:#5a6155; white-space:pre-wrap;">{{ msg.message }}</p>
          <p style="font-size:12px; color:#8fa190; margin-top:24px;">Received on {{ msg.created_at.strftime('%d %b %Y, %I:%M %p') }}</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
